<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星星在闪 - 管理后台</title>
    <link rel="stylesheet" href="/admin/css/admin.css" />
  </head>
  <body>
    <main class="container">
      <h1>星星在闪 - 管理后台</h1>

      <section id="loginPanel" class="card">
        <h2>管理员登录</h2>
        <input id="username" placeholder="账号（默认：admin）" />
        <input id="password" type="password" placeholder="密码（默认：admin123）" />
        <button id="loginBtn">登录</button>
        <p id="loginMsg" class="msg"></p>
      </section>

      <section id="dashboardPanel" class="card hidden">
        <div class="toolbar">
          <label>开始日期 <input id="dateFrom" type="date" /></label>
          <label>结束日期 <input id="dateTo" type="date" /></label>
          <button id="refreshBtn">刷新看板</button>
        </div>
        <div class="stats">
          <div>总发行：<strong id="totalIssued">0</strong></div>
          <div>总激活：<strong id="totalActivated">0</strong></div>
          <div>待激活流通：<strong id="pendingCount">0</strong></div>
          <div>区间激活率：<strong id="activationRate">0%</strong></div>
        </div>
      </section>

      <section id="batchPanel" class="card hidden">
        <h2>批次管理</h2>
        <div class="toolbar multi-line">
          <input id="batchName" placeholder="批次名称（必填）" />
          <input id="batchBrand" placeholder="品牌名称（选填）" />
          <input id="batchNote" placeholder="备注（选填）" />
          <input id="batchDisclosureText" placeholder="品牌露出文案（选填）" />
          <label class="checkbox-label"><input id="batchDisclosureDefault" type="checkbox" /><span>品牌露出默认开启</span></label>
          <button id="createBatchBtn">创建批次</button>
          <button id="refreshBatchBtn">刷新批次</button>
        </div>
        <div class="toolbar multi-line" style="margin-top:8px;">
          <select id="qrBatchSelect"><option value="">选择批次（选填）</option></select>
          <input id="qrPrefix" placeholder="二维码前缀（必填，如STAR）" />
          <input id="qrCount" type="number" min="1" value="10" placeholder="生成数量" />
          <button id="generateQrBtn">生成二维码</button>
        </div>
        <p id="batchMsg" class="msg"></p>
        <table>
          <thead>
            <tr>
              <th>批次ID</th>
              <th>名称</th>
              <th>品牌</th>
              <th>二维码数</th>
              <th>激活率</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="batchTable"></tbody>
        </table>
      </section>


      <section id="operatorPanel" class="card hidden">
        <h2>账号管理（管理员/质检员）</h2>
        <div class="toolbar multi-line">
          <input id="opName" placeholder="姓名（选填）" />
          <input id="opUsername" placeholder="账号（必填）" />
          <input id="opPassword" placeholder="密码（必填）" />
          <select id="opRole">
            <option value="qc">质检员</option>
            <option value="admin">管理员</option>
          </select>
          <button id="createOpBtn">新增账号</button>
          <button id="refreshOpBtn">刷新账号列表</button>
        </div>
        <p id="opMsg" class="msg"></p>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>姓名</th>
              <th>账号</th>
              <th>角色</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="operatorTable"></tbody>
        </table>
      </section>

      <section id="recordsPanel" class="card hidden">
        <div class="toolbar multi-line">
          <select id="batchFilter">
            <option value="">批次（全部）</option>
          </select>
          <select id="issueStatus">
            <option value="">发行状态（全部）</option>
            <option value="issued">已发行</option>
            <option value="unissued">未发行</option>
          </select>
          <select id="activationStatus">
            <option value="">激活状态（全部）</option>
            <option value="unactivated">未激活</option>
            <option value="activated">已激活</option>
          </select>
          <select id="hiddenStatus">
            <option value="">显示状态（全部）</option>
            <option value="false">显示</option>
            <option value="true">隐藏</option>
          </select>
          <input id="idSearch" placeholder="按ID前缀搜索，如 STAR00" />
          <button id="filterBtn">筛选</button>
        </div>

        <div class="toolbar">
          <select id="assignBatchSelect">
            <option value="">选择批次后可绑定</option>
          </select>
          <button id="assignBatchBtn">批量绑定批次</button>
          <button id="batchHideBtn">批量隐藏</button>
          <button id="batchShowBtn">批量显示</button>
          <button id="batchExportBtn">批量导出 CSV</button>
          <span id="selectedCount">已选 0 条</span>
        </div>

        <table>
          <thead>
            <tr>
              <th><input id="selectAll" type="checkbox" /></th>
              <th>ID</th>
              <th>二维码</th>
              <th>批次ID</th>
              <th>发行状态</th>
              <th>激活状态</th>
              <th>隐藏状态</th>
              <th>手机号</th>
              <th>时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="recordTable"></tbody>
        </table>
      </section>
    </main>

    <script src="/admin/js/admin.js"></script>
  </body>
</html>
