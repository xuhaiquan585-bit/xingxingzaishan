<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>把这一刻留在这瓶酒里 - 星星在闪</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <main class="container auth-container">
      <h1>把这一刻留在这瓶酒里</h1>
      <p class="subtitle">验证手机号，方便以后找回这瓶酒里的记录。</p>

      <div class="card">
        <label for="phone">手机号</label>
        <input id="phone" maxlength="11" placeholder="请输入11位手机号" />
        <label for="smsCode">验证码</label>
        <div class="sms-row">
          <input id="smsCode" maxlength="6" placeholder="请输入6位验证码" />
          <button id="sendCodeBtn" class="btn btn-secondary sms-btn" type="button">获取验证码</button>
        </div>

        <label class="checkbox-row">
          <input id="agree" type="checkbox" />
          <span>我已阅读并同意使用规则</span>
        </label>

        <button id="registerBtn" class="btn" disabled>验证并继续</button>
        <p id="message" class="message"></p>
      </div>
      <p class="field-hint" style="text-align:center; margin-top:16px;">🔍 这瓶酒还没人记录，验证后您的照片和留言将被永久保存</p>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/register.js"></script>
  </body>
</html>
