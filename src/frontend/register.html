<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>把这一刻，记在这瓶酒里 - 星星在闪</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <main class="container auth-container">
      <div class="page-intro auth-intro">
        <h1>把这一刻，记在这瓶酒里</h1>
        <p class="subtitle">这瓶酒可以永久保存一张照片和一句话，以后扫码随时查看。</p>
      </div>

      <div class="card auth-card">
        <label for="phone">手机号</label>
        <input id="phone" maxlength="11" placeholder="请输入11位手机号" />
        <label for="smsCode">验证码</label>
        <div class="sms-row">
          <input id="smsCode" maxlength="6" placeholder="请输入6位验证码" />
          <button id="sendCodeBtn" class="btn btn-secondary sms-btn" type="button">获取验证码</button>
        </div>

        <label class="checkbox-row">
          <input id="agree" type="checkbox" />
          <span>我已阅读并同意使用规则</span>
        </label>

        <button id="registerBtn" class="btn" disabled>验证并继续</button>
        <p id="message" class="message"></p>
      </div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/register.js"></script>
  </body>
</html>
