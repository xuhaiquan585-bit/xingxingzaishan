<!doctype html>
<html lang="zh-CN" class="theme-dawn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>记录详情 - 星星在闪</title>
    <script>
      if (new URLSearchParams(window.location.search).get('ui') === 'dark') {
        document.documentElement.classList.remove('theme-dawn');
      }
    </script>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/theme-dawn.css" />
  </head>
  <body>
    <main class="container record-detail-page">
      <div class="page-intro detail-intro">
        <h1>记录详情</h1>
        <p class="subtitle">查看这张星贴里的完整记录</p>
        <div class="detail-meta-line">
          <p class="detail-star-id">星贴 <strong id="detailHeaderId"></strong></p>
          <p class="account-meta-line">
            <strong id="currentPhoneText"></strong>
            <span class="account-meta-separator">·</span>
            <a id="switchPhoneBtn" class="account-meta-link" href="javascript:void(0)">更换手机号</a>
          </p>
        </div>
        <p id="detailMessage" class="message"></p>
      </div>

      <section id="detailSection" class="card detail-card hidden">
        <img id="detailImage" class="detail-cover" alt="点亮图片" />
        <div class="detail-body">
          <section class="detail-memory-group">
            <p class="detail-section-label">留下的话</p>
            <p id="detailContent" class="record-content"></p>
          </section>
          <div id="detailComments" class="result-comments hidden"></div>
          <div class="detail-credential-group">
            <p class="detail-info-row"><span>保存时间</span><strong id="detailTime"></strong></p>
            <p class="detail-info-row"><span>存证状态</span><strong id="detailChainStatus"></strong></p>
            <div id="detailHashGroup" class="detail-hash-group hidden">
              <p class="detail-section-label">存证哈希</p>
              <p id="detailHash" class="detail-hash-value"></p>
              <div class="detail-link-row">
                <button id="copyHashBtn" class="text-button" type="button">复制</button>
                <button id="toggleHashBtn" class="text-button" type="button">查看完整哈希</button>
                <a id="detailCertificateLink" class="text-button hidden" href="#" target="_blank" rel="noopener noreferrer">查看存证信息</a>
              </div>
              <p class="field-hint detail-hash-note">存证哈希是这条记录的唯一校验信息，可用于核对存证记录是否一致。</p>
              <p id="hashMessage" class="message hash-message"></p>
            </div>
          </div>
          <div id="detailBrandGroup" class="detail-brand-group hidden">
            <p class="detail-section-label">品牌信息</p>
            <p id="detailBrand" class="credential-brand"></p>
          </div>
        </div>
      </section>

      <a href="/me.html" class="btn btn-secondary detail-back-link">返回我的记录</a>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/me-detail.js"></script>
  </body>
</html>
