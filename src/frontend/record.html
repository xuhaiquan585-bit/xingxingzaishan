<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>把这一刻，记在这瓶酒里 - 星星在闪</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <main class="container">
      <div id="pageIntro" class="page-intro">
        <h1>留下这瓶酒的专属记录</h1>
        <p class="subtitle">选一张照片，写一句话，永久记在这瓶酒里。</p>
      </div>

      <section id="formSection" class="card hidden">
        <p class="qr-id-hint">星星ID：<strong id="qrIdText"></strong></p>
        <p class="qr-id-hint">当前手机号：<strong id="currentPhoneText"></strong>（<a id="switchPhoneBtn" href="javascript:void(0)">更换手机号</a>）</p>

        <label for="imageInput">添加照片</label>
        <input id="imageInput" class="file-input" type="file" accept="image/*" />
        <div class="upload-area" id="uploadArea">
          <div class="upload-area-placeholder">
            <span id="uploadActionText">添加照片</span>
          </div>
        </div>
        <div id="uploadFeedback" class="upload-feedback hidden">
          <span id="uploadFeedbackText">已选择照片</span>
        </div>
        <img id="preview" class="preview hidden" alt="预览图" />

        <label for="content">写下想记住的话</label>
        <p class="field-hint">最多 200 字</p>
        <textarea id="content" maxlength="200" placeholder="例：这一刻，我想记下的是……"></textarea>
        <p id="count">0 / 200</p>

        <div id="brandSection" class="brand-card hidden">
          <p id="brandPreviewText" class="brand-preview"></p>
          <div class="checkbox-row">
            <input id="showBrandDisclosure" type="checkbox" />
            <label for="showBrandDisclosure">显示酒的品牌信息</label>
          </div>
        </div>

        <button id="submitBtn" class="btn">预览并确认</button>
        <p id="formMessage" class="message"></p>
      </section>

      <section id="resultSection" class="card hidden">
        <div class="result-success-banner">
          <p class="result-success-title">✨ 保存成功</p>
          <p class="result-success-sub">记在星上，闪到永远</p>
        </div>

        <div class="memory-card">
          <img id="resultImage" class="preview result-image" alt="保存的照片" />
          <p id="resultContent" class="memory-content"></p>
        </div>

        <div class="credential-card">
          <p class="brand-line"><span class="brand">星星在闪</span> - <span id="resultTime"></span></p>
          <button id="resultHashToggle" class="hash-toggle" type="button">查看永久记录凭证</button>
          <div id="resultHash" class="credential-detail hidden">
            <p class="credential-label">区块链凭证编号</p>
            <p id="resultHashValue" class="credential-hash"></p>
          </div>
          <p id="resultBrandDisclosure" class="credential-brand hidden"><span id="resultBrandName"></span><span id="resultBrandSeparator"></span><span id="resultBrandDisclosureText"></span></p>
        </div>

        <div class="result-actions">
          <button id="shareBtn" class="btn">分享给朋友</button>
          <a id="myRecordsBtn" class="btn btn-secondary" href="/me.html">查看我的记录</a>
        </div>
        <p class="project-link-wrap"><a class="project-link" href="/landing.html?from=success">这是什么？</a></p>
        <p class="field-hint" style="text-align:center;">别人扫码就能看到您的记录了</p>
      </section>

      <div id="confirmOverlay" class="overlay hidden">
        <div class="overlay-mask"></div>
        <div class="overlay-panel">
          <p class="overlay-title">确认保存这一刻</p>
          <div class="confirm-preview">
            <img id="confirmPreviewImage" class="confirm-preview-image hidden" alt="即将保存的照片" />
            <p id="confirmPreviewContent" class="confirm-preview-content"></p>
          </div>
          <p class="overlay-subtitle">提交后，这张照片和这句话，将生成这瓶酒的区块链永久记录。以后扫码只能查看，不能修改。</p>
          <button id="confirmSubmitBtn" class="btn">确认提交</button>
          <button id="cancelSubmitBtn" class="btn btn-secondary">返回修改</button>
        </div>
      </div>

      <div id="stageHint" class="stage-hint hidden">✨ 这一刻，正在被记在星上…</div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/record.js"></script>
  </body>
</html>
