<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>点亮这颗星 - 星星在闪</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <main class="container">
      <div class="page-intro">
        <h1>点亮这颗星，留下你的祝福 ✨</h1>
        <p class="subtitle">上传一张照片 + 写一句话，就能完成点亮</p>
      </div>

      <section id="formSection" class="card hidden">
        <p class="qr-id-hint">星星ID：<strong id="qrIdText"></strong></p>
        <p class="qr-id-hint">当前手机号：<strong id="currentPhoneText"></strong>（<a id="switchPhoneBtn" href="javascript:void(0)">更换手机号</a>）</p>

        <label for="imageInput">选择一张照片</label>
        <input id="imageInput" type="file" accept="image/*" />
        <div id="uploadFeedback" class="upload-feedback hidden">
          <span id="uploadFeedbackIcon">✅</span> <span id="uploadFeedbackText">图片已上传</span>
        </div>
        <img id="preview" class="preview hidden" alt="预览图" />

        <label for="content">写下你想说的话（0-200字）</label>
        <textarea id="content" maxlength="200" placeholder="写下你想说的话（例如：生日快乐 🎂）"></textarea>
        <p id="count">0 / 200</p>

        <div id="brandSection" class="brand-card hidden">
          <p id="brandPreviewText" class="brand-preview"></p>
          <div class="checkbox-row">
            <input id="showBrandDisclosure" type="checkbox" />
            <label for="showBrandDisclosure">展示品牌信息（不影响内容）</label>
          </div>
        </div>

        <button id="submitBtn" class="btn">点亮这颗星 ⭐</button>
        <p id="formMessage" class="message"></p>
      </section>

      <section id="resultSection" class="card hidden">
        <div class="result-success-banner">
          <p class="result-success-title">✨ 点亮成功！</p>
          <p class="result-success-sub">记在星上，闪到永远</p>
        </div>
        <img id="resultImage" class="preview" alt="NFT图片" />
        <p id="resultContent"></p>
        <p><span id="resultHashToggle" class="hash-toggle">🔗 区块链存证编号</span></p>
        <p id="resultHash" class="qr-id-hint hidden"></p>
        <p class="brand-line"><span class="brand">⭐ 星星在闪</span> - <span id="resultTime"></span></p>
        <p id="resultBrandDisclosure" class="brand-disclosure hidden"><span id="resultBrandName"></span> <span id="resultBrandDisclosureText"></span></p>
        <p class="save-hint">📸 截图保存这一刻</p>
        <div class="result-actions">
          <button id="downloadBtn" class="btn btn-secondary">下载 NFT 图片</button>
          <button id="shareBtn" class="btn btn-secondary">分享给朋友</button>
          <a id="myRecordsBtn" class="btn btn-secondary" href="/me.html">查看我的点亮记录</a>
          <a class="btn btn-secondary" href="/landing.html?from=success">了解这个项目</a>
        </div>
      </section>

      <div id="confirmOverlay" class="overlay hidden">
        <div class="overlay-mask"></div>
        <div class="overlay-panel">
          <p class="overlay-title">把这一刻记在星上</p>
          <p class="overlay-subtitle">这颗星将闪到永远<br />提交后将无法修改</p>
          <button id="confirmSubmitBtn" class="btn">确认点亮</button>
          <button id="cancelSubmitBtn" class="btn btn-secondary">再看看</button>
        </div>
      </div>

      <div id="stageHint" class="stage-hint hidden">✨ 这一刻，正在被记在星上…</div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/record.js"></script>
  </body>
</html>
