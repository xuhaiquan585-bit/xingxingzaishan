<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的点亮记录 - 星星在闪</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <main class="container">
      <div class="page-intro">
        <h1>我的点亮记录</h1>
        <p class="subtitle">查看你点亮过的所有星星</p>
      </div>

      <section class="card">
        <p class="qr-id-hint">当前手机号：<strong id="currentPhoneText"></strong>（<a id="switchPhoneBtn" href="javascript:void(0)">更换手机号</a>）</p>
        <p id="pageMessage" class="message"></p>
      </section>

      <section id="emptySection" class="card hidden">
        <p class="subtitle">你还没有点亮记录，去扫码点亮第一颗星吧 ✨</p>
        <a href="/" class="btn">去点亮星星</a>
      </section>

      <section id="recordsSection" class="record-feed hidden"></section>

      <section class="card">
        <a class="btn btn-secondary" href="/landing.html?from=me">合作方案</a>
      </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/me.js"></script>
  </body>
</html>
